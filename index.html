<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шалфей</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
    <!-- Кнопка темы -->
    <button id="theme-toggle" class="theme-toggle" title="Сменить тему">🌓</button>

    <!-- Эффекты -->
    <div class="effects-container">
        <div id="sunRays" class="sun-rays"></div>
        <div id="moonLight" class="moon-light"></div>
        <div id="dustParticles" class="dust-particles"></div>
    </div>

    <!-- Персонаж -->
    <div class="character-container">
        <div id="characterGlow" class="character-glow"></div>
        <div class="character-area">
            <img id="character" src="persi_fox.png" alt="Шалфей">
            <span id="emotion" class="emotion-badge">😊</span>
        </div>
    </div>

    <!-- Вкладки -->
    <div class="tabs" id="main-tabs">
        <button class="tab-btn active" data-tab="chat">💬 Чат</button>
        <button class="tab-btn" data-tab="history-tests">📜 Тесты</button>
        <button class="tab-btn" data-tab="psychology">🧠 Психология</button>
    </div>

    <!-- Чат -->
    <div id="chat-tab" class="tab-content active">
        <div class="textbox">
            <div id="speaker">Шалфей</div>
            <div id="message">Загрузка...</div>
            <div class="input-area">
                <input type="text" id="command-input" placeholder="Напиши команду...">
                <button id="send-btn">➤</button>
            </div>
        </div>
    </div>

    <!-- Тесты по истории -->
    <div id="history-tests-tab" class="tab-content">
        <h2>📜 Тесты по истории России</h2>
        <div class="test-list" id="history-test-list"></div>
        <div id="history-quiz" class="hidden"></div>
        <button class="btn-back hidden" id="history-back-btn" onclick="exitHistoryTest()">← Назад</button>
    </div>

    <!-- Психология (Ася) -->
    <div id="psychology-tab" class="tab-content">
        <div class="psych-container">
            <div class="asya-header">
                <img src="red_panda_asya.png" alt="Ася" class="asya-logo">
                <h2>Психология с Асей</h2>
                <p>Привет! Я Ася, отвечаю за психологию и твоё самочувствие 🐾</p>
            </div>
            <div class="psych-menu" id="psych-menu">
                <div class="psych-card" onclick="openFioModal('kos')">🧠 Тест КОС (40 вопросов)</div>
                <div class="psych-card" onclick="openFioModal('ryakhovsky')">🗣️ Тест Ряховского (16 вопросов)</div>
            </div>
            <div id="psych-quiz" class="hidden"></div>
            <div id="psych-results" class="hidden"></div>
            <button class="btn-back hidden" id="psych-back-btn" onclick="backToPsychMenu()">← Назад</button>
        </div>
    </div>

    <!-- Модальное окно ФИО -->
    <div class="modal-overlay" id="fio-modal">
        <div class="modal-box">
            <h3>🐾 Перед началом теста</h3>
            <input type="text" id="fio-input" placeholder="ФИО *" class="input">
            <input type="email" id="email-input" placeholder="Email (необязательно)" class="input">
            <div class="modal-actions">
                <button class="btn-primary" id="start-psych-btn">Начать</button>
                <button class="btn-secondary" id="cancel-psych-btn">Отмена</button>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
